version: "3.9"

services:
  tasks:
    build:
      context: ../services/tasks
      dockerfile: Dockerfile
    container_name: tasks_service
    ports:
      - "8083:8082"
    environment:
      TASKS_PORT: "8082"
    restart: unless-stopped
    networks:
      - tasks-network

networks:
  tasks-network:
    driver: bridge
